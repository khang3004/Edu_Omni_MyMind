# ==============================================================================
# DEFAULT HYPERPARAMETER & ENVIRONMENT CONFIGURATION FOR NLP RESEARCH
# ==============================================================================

# General configuration
project_name: "nlp_model_training"
experiment_name: "distilbert_classification_run"
seed: 42

# Dataset & preprocessing settings
data:
  raw_data_path: "data/raw/dataset.csv"
  processed_data_path: "data/processed/dataset.csv"
  test_size: 0.2
  max_length: 128
  batch_size: 32
  num_workers: 0

# Model architecture settings
model:
  model_type: "transformer"             # Supports: 'transformer', 'custom_lstm'
  pretrained_model_name: "distilbert-base-uncased"
  num_labels: 2
  hidden_size: 256
  dropout: 0.1

# Hyperparameters for training loops
training:
  epochs: 5
  learning_rate: 2.0e-5
  weight_decay: 0.01
  save_steps: 100
  logging_steps: 10
  output_dir: "models/"
  use_early_stopping: true
  patience: 2

# Logging & system configurations
logging:
  log_level: "INFO"
  use_wandb: false                      # Set true to enable Weights & Biases tracking
