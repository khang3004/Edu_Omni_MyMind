# =============================================================================
# EduMIND Multi-Service Stack (Docker Compose)
# =============================================================================
# Services:
#   label-studio  — Label Studio annotation UI (port 8080)
#   ml-backend    — EduMIND ML Backend / active-learning server (port 9090)
#   qdrant        — Qdrant vector database (port 6333, Web UI 6334)
#   neo4j         — Neo4j graph database (Bolt 7687, Web UI 7474)
# =============================================================================

x-common-env: &common-env
  LABEL_STUDIO_HOST: "http://localhost:8080"
  GOOGLE_API_KEY: "${GOOGLE_API_KEY:-}"
  QDRANT_MODE: "${QDRANT_MODE:-server}"
  QDRANT_HOST: "${QDRANT_HOST:-qdrant}"
  QDRANT_PORT: "${QDRANT_PORT:-6333}"
  NEO4J_URI: "${NEO4J_URI:-bolt://neo4j:7687}"
  NEO4J_USER: "${NEO4J_USER:-neo4j}"
  NEO4J_PASSWORD: "${NEO4J_PASSWORD:-omni_ips_password}"
  WHISPER_MODEL: "${WHISPER_MODEL:-tiny}"
  EMBEDDING_MODEL: "${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}"
  TRANSLATION_MODEL: "${TRANSLATION_MODEL:-none}"
  DEVICE: "${DEVICE:-cpu}"

services:
  # --- Qdrant Vector Database ---
  qdrant:
    image: qdrant/qdrant:latest
    container_name: edumind_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - edumind_net
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "cat < /dev/null > /dev/tcp/127.0.0.1/6333"]
      interval: 10s
      timeout: 5s
      retries: 3

  # --- Neo4j Graph Database ---
  neo4j:
    image: neo4j:5.20-community
    container_name: edumind_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:-omni_ips_password}"
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_import:/import
    networks:
      - edumind_net
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-omni_ips_password}", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # --- Label Studio Annotation Server ---
  label-studio:
    image: heartexlabs/label-studio:latest
    container_name: edumind_label_studio
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      <<: *common-env
      LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED: "true"
      LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT: /workspace/data
      LABEL_STUDIO_USERNAME: "${LABEL_STUDIO_USERNAME:-admin@edumind.local}"
      LABEL_STUDIO_PASSWORD: "${LABEL_STUDIO_PASSWORD:-edumind_admin_2024}"
      CSRF_TRUSTED_ORIGINS: "http://localhost:8080,http://127.0.0.1:8080"
      LABEL_STUDIO_DISABLE_UPDATE_CHECK: "true"
      LABEL_STUDIO_NO_ANALYTICS: "true"
    volumes:
      - label_studio_data:/label-studio/data
      - ./data:/workspace/data:ro
    networks:
      - edumind_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  # --- EduMIND ML Backend ---
  ml-backend:
    build:
      context: .
      dockerfile: Dockerfile.label-studio
    image: edumind/ml-backend:latest
    container_name: edumind_ml_backend
    restart: unless-stopped
    ports:
      - "9090:9090"
    environment:
      <<: *common-env
      CORPUS_JSONL_PATH: /workspace/data/processed/corpus.jsonl
      ML_BACKEND_HOST: "0.0.0.0"
      ML_BACKEND_PORT: "9090"
    volumes:
      - ./edumind:/workspace/edumind:ro
      - ./data:/workspace/data
    networks:
      - edumind_net
    depends_on:
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      label-studio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

volumes:
  label_studio_data:
    driver: local
  qdrant_storage:
    driver: local
  neo4j_data:
    driver: local
  neo4j_import:
    driver: local

networks:
  edumind_net:
    driver: bridge
